<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maintenance — Brad Bitt, mais le site</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- Favicon and app icons -->
  <link rel="icon" type="image/svg+xml" href="images/web/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="images/web/favicon-96x96.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="images/web/apple-touch-icon.png">
  <meta name="theme-color" content="#0b0b0f">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0b0b0f;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    @keyframes orb-drift {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.18; }
      25%  { transform: translate(30px, -40px) scale(1.08); opacity: 0.28; }
      50%  { transform: translate(-20px, -60px) scale(0.95); opacity: 0.22; }
      75%  { transform: translate(-40px, -20px) scale(1.05); opacity: 0.25; }
    }
    @keyframes orb-drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.14; }
      30%  { transform: translate(-50px, 30px) scale(1.1); opacity: 0.22; }
      60%  { transform: translate(40px, 50px) scale(0.92); opacity: 0.18; }
    }
    @keyframes orb-drift-3 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.12; }
      40%  { transform: translate(60px, -30px) scale(1.06); opacity: 0.2; }
      80%  { transform: translate(-30px, 40px) scale(0.98); opacity: 0.16; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      33%  { transform: translateY(-18px) rotate(1.5deg); }
      66%  { transform: translateY(-8px) rotate(-1deg); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.92); opacity: 0.5; }
      50%  { transform: scale(1.06); opacity: 0.15; }
      100% { transform: scale(0.92); opacity: 0.5; }
    }
    @keyframes tick-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%  { transform: translateY(-6px); opacity: 1; }
    }

    .scene {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 48px 24px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 { width: 400px; height: 400px; background: #32C0C1; top: -100px; left: -80px; animation: orb-drift 12s ease-in-out infinite; }
    .orb-2 { width: 320px; height: 320px; background: #F53098; bottom: -80px; right: -60px; animation: orb-drift-2 15s ease-in-out infinite; }
    .orb-3 { width: 260px; height: 260px; background: #7c5cbf; top: 40%; left: 55%; animation: orb-drift-3 10s ease-in-out infinite; }

    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 540px;
      width: 100%;
      animation: fade-in 0.9s ease forwards;
    }

    .pulse-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      animation: float 5s ease-in-out infinite;
    }
    .pulse-ring {
      position: absolute;
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 2px solid #32C0C1;
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    .pulse-ring-2 {
      position: absolute;
      width: 112px; height: 112px;
      border-radius: 50%;
      border: 1px solid rgba(50,192,193,0.35);
      animation: pulse-ring 2.5s ease-in-out infinite 0.6s;
    }
    .icon-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(50,192,193,0.1);
      border: 1.5px solid rgba(50,192,193,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .icon-circle svg { width: 30px; height: 30px; }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #e9eef6;
      margin-bottom: 12px;
      letter-spacing: -0.4px;
    }
    .subtitle {
      font-size: 15px;
      color: rgba(233,238,246,0.5);
      line-height: 1.65;
      margin-bottom: 40px;
    }

    .countdown-grid {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .cd-block {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 20px 12px;
      min-width: 76px;
    }
    .cd-num {
      font-size: 34px;
      font-weight: 800;
      color: #32C0C1;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      display: block;
    }
    .cd-num.pop { animation: tick-pop 0.2s ease; }
    .cd-label {
      font-size: 11px;
      color: rgba(233,238,246,0.35);
      text-transform: uppercase;
      letter-spacing: 0.9px;
      margin-top: 7px;
      display: block;
    }

    .progress-wrap {
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #32C0C1, #F53098);
      transition: width 1s linear;
    }

    .dots {
      display: flex;
      gap: 7px;
      justify-content: center;
      align-items: center;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(233,238,246,0.3);
      animation: dot-bounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    .done-msg {
      display: none;
      font-size: 20px;
      font-weight: 700;
      color: #32C0C1;
      animation: fade-in 0.6s ease forwards;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 20px; }
      .cd-num { font-size: 26px; }
      .cd-block { min-width: 60px; padding: 12px 14px 10px; }
      .countdown-grid { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
      <div class="pulse-wrapper">
        <div class="pulse-ring-2"></div>
        <div class="pulse-ring"></div>
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="#32C0C1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </div>
      </div>

      <h1>Site actuellement en maintenance</h1>
      <p class="subtitle">Pas de panique — on revient très vite.<br>Le site sera de nouveau accessible dans quelques minutes.</p>

      <div class="countdown-grid" id="countdown">
        <div class="cd-block">
          <span class="cd-num" id="cd-j">--</span>
          <span class="cd-label">jours</span>
        </div>
        <div class="cd-block">
          <span class="cd-num" id="cd-h">--</span>
          <span class="cd-label">heures</span>
        </div>
        <div class="cd-block">
          <span class="cd-num" id="cd-m">--</span>
          <span class="cd-label">min</span>
        </div>
        <div class="cd-block">
          <span class="cd-num" id="cd-s">--</span>
          <span class="cd-label">sec</span>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>

      <p class="done-msg" id="done-msg">Le site est de retour — bienvenue !</p>

      <div class="dots" id="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <script>
    const target = new Date('2026-03-20T10:10:00');
    const start  = new Date('2026-03-20T10:04:00');
    const total  = target - start;

    const elJ    = document.getElementById('cd-j');
    const elH    = document.getElementById('cd-h');
    const elM    = document.getElementById('cd-m');
    const elS    = document.getElementById('cd-s');
    const fill   = document.getElementById('progress-fill');
    const doneMsg   = document.getElementById('done-msg');
    const countdown = document.getElementById('countdown');
    const dots      = document.getElementById('dots');

    function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

    function pop(el) {
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
    }

    let prevS = null;

    function tick() {
      const now  = new Date();
      const diff = target - now;

      if (diff <= 0) {
        countdown.style.display = 'none';
        dots.style.display = 'none';
        doneMsg.style.display = 'block';
        fill.style.width = '100%';
        return;
      }

      const j = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);

      elJ.textContent = pad(j);
      elH.textContent = pad(h);
      elM.textContent = pad(m);
      elS.textContent = pad(s);

      if (prevS !== s) { pop(elS); prevS = s; }

      const elapsed = now - start;
      const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
      fill.style.width = pct.toFixed(2) + '%';
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
